apiVersion: apps/v1
kind: Deployment
metadata:
  name: cloudops-app
spec:
  replicas: 2
  selector:
    matchLabels:
      app: cloudops-app
  template:
    metadata:
      labels:
        app: cloudops-app
    spec:
      containers:
      - name: cloudops-app
        image: cloudops-app:v1
        ports:
        - containerPort: 5002
