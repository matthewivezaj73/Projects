apiVersion: v1
kind: ConfigMap
metadata:
  name: prometheus-config

data:
  prometheus.yml: |
    global:
      scrape_interval: 5s

    rule_files:
      - "/etc/prometheus/slo-rules.yaml"

    scrape_configs:

      - job_name: "cloudops-app"

        metrics_path: /metrics

        static_configs:
          - targets: ["cloudops-service:80"]
