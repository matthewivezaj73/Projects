apiVersion: apps/v1
kind: Deployment

metadata:
  name: prometheus

spec:
  replicas: 1

  selector:
    matchLabels:
      app: prometheus

  template:
    metadata:
      labels:
        app: prometheus

    spec:
      containers:
        - name: prometheus
          image: prom/prometheus

          ports:
            - containerPort: 9090

          volumeMounts:
            - name: config
              mountPath: /etc/prometheus/

            - name: slo-rules
              mountPath: /etc/prometheus/slo-rules.yaml
              subPath: slo-rules.yaml

      volumes:
        - name: config
          configMap:
            name: prometheus-config

        - name: slo-rules
          configMap:
            name: slo-rules-config
