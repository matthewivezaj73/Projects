replicaCount: 2

image:
  repository: your-docker-image
  tag: latest
  pullPolicy: IfNotPresent

service:
  type: ClusterIP
  port: 80

serviceAccount:
  create: false
  name: ""

ingress:
  enabled: false

autoscaling:
  enabled: false
  minReplicas: 2
  maxReplicas: 5
  targetCPUUtilizationPercentage: 50

podAnnotations: {}

podLabels: {}

imagePullSecrets: []

podSecurityContext: {}

securityContext: {}
