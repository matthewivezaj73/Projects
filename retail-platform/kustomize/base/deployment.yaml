apiVersion: apps/v1
kind: Deployment
metadata:
  name: retail-backend
  labels:
    app: retail-backend

spec:
  replicas: 2

  selector:
    matchLabels:
      app: retail-backend

  template:
    metadata:
      labels:
        app: retail-backend

    spec:
      containers:
        - name: retail-backend
          image: retail-backend:1.0
          ports:
            - containerPort: 8080
